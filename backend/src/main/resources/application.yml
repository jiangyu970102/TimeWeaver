server:
  port: 8080

spring:
  application:
    name: timeweaver

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/timeweaver?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  ai:
    openai:
      api-key: ${AI_API_KEY:sk-your-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.timeweaver.entity
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: TimeWeaver2026SecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000  # 24h


# Logging
logging:
  level:
    com.timeweaver: debug
    org.springframework.security: info
